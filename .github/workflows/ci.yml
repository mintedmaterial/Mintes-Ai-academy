name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck, validate, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Validate
        run: npm run validate

      - name: Export pull request body
        if: github.event_name == 'pull_request'
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/validate-pr-contract.mjs

      - name: Dependency audit (informational)
        shell: bash
        run: |
          set +e
          npm audit --omit=optional --audit-level=high --json > audit-report.json
          audit_status=$?
          set -e
          if [ ! -s audit-report.json ]; then
            echo "npm audit produced no report; treating this as an execution failure"
            exit 1
          fi
          node -e 'const fs=require("fs"); const d=JSON.parse(fs.readFileSync("audit-report.json", "utf8")); if (!d.metadata || !d.metadata.vulnerabilities) { console.error("npm audit report is not a vulnerability report"); process.exit(1); } console.log(JSON.stringify(d.metadata.vulnerabilities));'
          if [ "$audit_status" -ne 0 ]; then
            echo "npm audit reported findings; see issue #4. The audit is informational for this pilot."
          fi
