<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#0b1422"/><circle cx="1700" cy="100" r="320" fill="#133b54" opacity=".34"/><circle cx="80" cy="1040" r="330" fill="#2c1d5a" opacity=".22"/><text x="100" y="82" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">MINTE AI ACADEMY  /  EPISODE 02</text><text x="100" y="168" fill="#f3f7ff" font-family="Arial" font-size="58" font-weight="700" text-anchor="start">02 / PROVE ONE REAL CHAT</text><text x="100" y="220" fill="#a9b7d0" font-family="Arial" font-size="27" font-weight="400" text-anchor="start">Do not add gateways or automation while the smallest loop is broken.</text><line x1="100" y1="270" x2="1820" y2="270" stroke="#65e6d0" stroke-width="2"/><text x="100" y="1030" fill="#7081a4" font-family="monospace" font-size="19" font-weight="400" text-anchor="start">Cleo  •  Hermes Agent  •  privacy-safe instructional visualization</text><rect x="100" y="335" width="1040" height="390" rx="18" fill="#07101c" stroke="#2b4669" stroke-width="2"/><rect x="100" y="335" width="1040" height="48" rx="18" fill="#12233c" stroke="#2b4669" stroke-width="2"/><text x="124" y="367" fill="#65e6d0" font-family="Arial" font-size="20" font-weight="700" text-anchor="start">TERMINAL / RUN THIS</text><text x="1052" y="367" fill="#7081a4" font-family="Arial" font-size="15" font-weight="700" text-anchor="start">●  ●  ●</text><text x="128" y="423" fill="#a9b7d0" font-family="monospace" font-size="24" font-weight="400" text-anchor="start">$ hermes chat -q &quot;Reply with exactly three words:</text><text x="128" y="469" fill="#a9b7d0" font-family="monospace" font-size="24" font-weight="400" text-anchor="start">  Hermes is working&quot;</text><text x="128" y="515" fill="#8ff0b2" font-family="monospace" font-size="31" font-weight="400" text-anchor="start">Hermes is working</text><text x="128" y="568" fill="#a9b7d0" font-family="monospace" font-size="18" font-weight="400" text-anchor="start"></text><text x="128" y="608" fill="#a9b7d0" font-family="monospace" font-size="26" font-weight="400" text-anchor="start">$ hermes doctor</text><text x="128" y="656" fill="#8ff0b2" font-family="monospace" font-size="27" font-weight="400" text-anchor="start">Provider   ✓   Model   ✓   Auth   ✓</text><rect x="1220" y="335" width="600" height="390" rx="18" fill="#111e33" stroke="#2b4669" stroke-width="2"/><text x="1260" y="395" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">THIS IS THE GATE</text><rect x="1260" y="442" width="99" height="38" rx="19" fill="#102a3a" stroke="#65e6d0" stroke-width="1"/><text x="1309.5" y="468" fill="#65e6d0" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">INPUT</text><text x="1260" y="510" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">tiny prompt</text><rect x="1260" y="537" width="112" height="38" rx="19" fill="#102a3a" stroke="#65e6d0" stroke-width="1"/><text x="1316.0" y="563" fill="#65e6d0" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">OUTPUT</text><text x="1260" y="605" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">actual model response</text><rect x="1260" y="632" width="125" height="38" rx="19" fill="#102a3a" stroke="#ffcf70" stroke-width="1"/><text x="1322.5" y="658" fill="#ffcf70" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">FAILURE</text><text x="1260" y="700" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">stay here; run doctor</text><rect x="100" y="800" width="1720" height="105" rx="16" fill="#0e2231" stroke="#2c6a76" stroke-width="2"/><text x="135" y="865" fill="#f3f7ff" font-family="Arial" font-size="25" font-weight="700" text-anchor="start">Proof standard: one prompt in → one real answer out. A port, process, or saved key is not 