<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#111526"/><circle cx="1700" cy="100" r="320" fill="#133b54" opacity=".34"/><circle cx="80" cy="1040" r="330" fill="#2c1d5a" opacity=".22"/><text x="100" y="82" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">MINTE AI ACADEMY  /  EPISODE 02</text><text x="100" y="168" fill="#f3f7ff" font-family="Arial" font-size="58" font-weight="700" text-anchor="start">05 / SCHEDULE A SAFE FIRST TASK</text><text x="100" y="220" fill="#a9b7d0" font-family="Arial" font-size="27" font-weight="400" text-anchor="start">Start local. Show the complete command, then verify the artifact—not just the scheduler row.</text><line x1="100" y1="270" x2="1820" y2="270" stroke="#65e6d0" stroke-width="2"/><text x="100" y="1030" fill="#7081a4" font-family="monospace" font-size="19" font-weight="400" text-anchor="start">Cleo  •  Hermes Agent  •  privacy-safe instructional visualization</text><rect x="100" y="330" width="1720" height="335" rx="18" fill="#07101c" stroke="#2b4669" stroke-width="2"/><rect x="100" y="330" width="1720" height="48" rx="18" fill="#12233c" stroke="#2b4669" stroke-width="2"/><text x="124" y="362" fill="#65e6d0" font-family="Arial" font-size="20" font-weight="700" text-anchor="start">TERMINAL / RUN THIS</text><text x="1732" y="362" fill="#7081a4" font-family="Arial" font-size="15" font-weight="700" text-anchor="start">●  ●  ●</text><text x="128" y="418" fill="#a9b7d0" font-family="monospace" font-size="23" font-weight="400" text-anchor="start">$ hermes cron create &quot;every weekday at 09:00&quot;</text><text x="128" y="463" fill="#a9b7d0" font-family="monospace" font-size="23" font-weight="400" text-anchor="start">  &quot;Write a three-bullet research brief to</text><text x="128" y="508" fill="#a9b7d0" font-family="monospace" font-size="23" font-weight="400" text-anchor="start">   C:/Users/you/hermes-output/research-brief.md&quot;</text><text x="128" y="553" fill="#8ff0b2" font-family="monospace" font-size="26" font-weight="400" text-anchor="start">Created job: research-brief</text><rect x="100" y="715" width="510" height="175" rx="16" fill="#111e33" stroke="#2b4669" stroke-width="2"/><text x="135" y="760" fill="#65e6d0" font-family="monospace" font-size="22" font-weight="700" text-anchor="start">1  LIST</text><text x="135" y="810" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">hermes cron list</text><text x="135" y="850" fill="#a9b7d0" font-family="Arial" font-size="19" font-weight="400" text-anchor="start">confirm schedule + target</text><rect x="705" y="715" width="510" height="175" rx="16" fill="#111e33" stroke="#2b4669" stroke-width="2"/><text x="740" y="760" fill="#65e6d0" font-family="monospace" font-size="22" font-weight="700" text-anchor="start">2  RUN</text><text x="740" y="810" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">hermes cron run &lt;job_id&gt;</text><text x="740" y="850" fill="#a9b7d0" font-family="Arial" font-size="19" font-weight="400" text-anchor="start">trigger a controlled test</text><rect x="1310" y="715" width="510" height="175" rx="16" fill="#111e33" stroke="#2b4669" stroke-width="2"/><text x="1345" y="760" fill="#65e6d0" font-family="monospace" font-size="22" font-weight="700" text-anchor="start">3  INSPECT</text><text x="1345" y="810" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">open research-brief.md</text><text x="1345" y="850" fill="#a9b7d0" font-family="Arial" font-size="19" font-weight="400" text-anchor="start">verify the real artifact</text></svg>