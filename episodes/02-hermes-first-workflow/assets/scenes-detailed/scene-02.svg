<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#091426"/><circle cx="1700" cy="100" r="320" fill="#133b54" opacity=".34"/><circle cx="80" cy="1040" r="330" fill="#2c1d5a" opacity=".22"/><text x="100" y="82" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">MINTE AI ACADEMY  /  EPISODE 02</text><text x="100" y="168" fill="#f3f7ff" font-family="Arial" font-size="58" font-weight="700" text-anchor="start">01 / VERIFY WHAT IS ACTUALLY INSTALLED</text><text x="100" y="220" fill="#a9b7d0" font-family="Arial" font-size="27" font-weight="400" text-anchor="start">Run these in order. Each command answers a different question.</text><line x1="100" y1="270" x2="1820" y2="270" stroke="#65e6d0" stroke-width="2"/><text x="100" y="1030" fill="#7081a4" font-family="monospace" font-size="19" font-weight="400" text-anchor="start">Cleo  •  Hermes Agent  •  privacy-safe instructional visualization</text><rect x="100" y="325" width="930" height="520" rx="18" fill="#07101c" stroke="#2b4669" stroke-width="2"/><rect x="100" y="325" width="930" height="48" rx="18" fill="#12233c" stroke="#2b4669" stroke-width="2"/><text x="124" y="357" fill="#65e6d0" font-family="Arial" font-size="20" font-weight="700" text-anchor="start">TERMINAL / RUN THIS</text><text x="942" y="357" fill="#7081a4" font-family="Arial" font-size="15" font-weight="700" text-anchor="start">●  ●  ●</text><text x="128" y="413" fill="#a9b7d0" font-family="monospace" font-size="27" font-weight="400" text-anchor="start">$ hermes --version</text><text x="128" y="462" fill="#8ff0b2" font-family="monospace" font-size="29" font-weight="400" text-anchor="start">Hermes Agent v0.18.2</text><text x="128" y="513" fill="#a9b7d0" font-family="monospace" font-size="20" font-weight="400" text-anchor="start"></text><text x="128" y="555" fill="#a9b7d0" font-family="monospace" font-size="27" font-weight="400" text-anchor="start">$ hermes config path</text><text x="128" y="604" fill="#8ff0b2" font-family="monospace" font-size="25" font-weight="400" text-anchor="start">C:/Users/you/.hermes</text><text x="128" y="651" fill="#a9b7d0" font-family="monospace" font-size="20" font-weight="400" text-anchor="start"></text><text x="128" y="693" fill="#a9b7d0" font-family="monospace" font-size="27" font-weight="400" text-anchor="start">$ hermes config check</text><text x="128" y="742" fill="#8ff0b2" font-family="monospace" font-size="27" font-weight="400" text-anchor="start">Configuration Status  ✓</text><rect x="1110" y="325" width="710" height="520" rx="18" fill="#101b30" stroke="#2b4669" stroke-width="2"/><text x="1150" y="380" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">WHAT TO LOOK FOR</text><rect x="1150" y="415" width="151" height="38" rx="19" fill="#102a3a" stroke="#65e6d0" stroke-width="1"/><text x="1225.5" y="441" fill="#65e6d0" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">--version</text><text x="1150" y="483" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Which executable answered?</text><rect x="1150" y="515" width="177" height="38" rx="19" fill="#102a3a" stroke="#65e6d0" stroke-width="1"/><text x="1238.5" y="541" fill="#65e6d0" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">config path</text><text x="1150" y="583" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Which Hermes home is active?</text><rect x="1150" y="615" width="190" height="38" rx="19" fill="#102a3a" stroke="#65e6d0" stroke-width="1"/><text x="1245.0" y="641" fill="#65e6d0" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">config check</text><text x="1150" y="683" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Are files missing or stale?</text><rect x="1150" y="715" width="203" height="38" rx="19" fill="#102a3a" stroke="#65e6d0" stroke-width="1"/><text x="1251.5" y="741" fill="#65e6d0" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">setup / model</text><text x="1150" y="783" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Is the provider ready?</text><text x="100" y="925" fill="#ffcf70" font-family="Arial" font-size="24" font-weight="700" text-anchor="start">A successful install proves the command exists. It does not prove a model can answer.</text></svg>