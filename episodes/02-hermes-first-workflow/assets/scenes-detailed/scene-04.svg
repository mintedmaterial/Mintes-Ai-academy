<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#101329"/><circle cx="1700" cy="100" r="320" fill="#133b54" opacity=".34"/><circle cx="80" cy="1040" r="330" fill="#2c1d5a" opacity=".22"/><text x="100" y="82" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">MINTE AI ACADEMY  /  EPISODE 02</text><text x="100" y="168" fill="#f3f7ff" font-family="Arial" font-size="58" font-weight="700" text-anchor="start">03 / TURN A REPEATED PROCEDURE INTO A SKILL</text><text x="100" y="220" fill="#a9b7d0" font-family="Arial" font-size="27" font-weight="400" text-anchor="start">Skills hold reusable operating knowledge. Keep them focused and verifiable.</text><line x1="100" y1="270" x2="1820" y2="270" stroke="#65e6d0" stroke-width="2"/><text x="100" y="1030" fill="#7081a4" font-family="monospace" font-size="19" font-weight="400" text-anchor="start">Cleo  •  Hermes Agent  •  privacy-safe instructional visualization</text><rect x="100" y="335" width="760" height="320" rx="18" fill="#07101c" stroke="#2b4669" stroke-width="2"/><rect x="100" y="335" width="760" height="48" rx="18" fill="#12233c" stroke="#2b4669" stroke-width="2"/><text x="124" y="367" fill="#65e6d0" font-family="Arial" font-size="20" font-weight="700" text-anchor="start">TERMINAL / RUN THIS</text><text x="772" y="367" fill="#7081a4" font-family="Arial" font-size="15" font-weight="700" text-anchor="start">●  ●  ●</text><text x="128" y="423" fill="#a9b7d0" font-family="monospace" font-size="25" font-weight="400" text-anchor="start">$ hermes skills list</text><text x="128" y="470" fill="#8ff0b2" font-family="monospace" font-size="26" font-weight="400" text-anchor="start">episode-production</text><text x="128" y="518" fill="#8ff0b2" font-family="monospace" font-size="26" font-weight="400" text-anchor="start">research-brief</text><text x="128" y="566" fill="#a9b7d0" font-family="monospace" font-size="18" font-weight="400" text-anchor="start"></text><text x="128" y="606" fill="#a9b7d0" font-family="monospace" font-size="23" font-weight="400" text-anchor="start">$ hermes skills search &quot;research&quot;</text><text x="128" y="651" fill="#8ff0b2" font-family="monospace" font-size="24" font-weight="400" text-anchor="start">2 matching skills</text><rect x="950" y="335" width="870" height="510" rx="18" fill="#111e33" stroke="#2b4669" stroke-width="2"/><text x="990" y="395" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">A GOOD SKILL CONTAINS</text><text x="990" y="455" fill="#d59cff" font-family="monospace" font-size="21" font-weight="700" text-anchor="start">TRIGGER</text><text x="1210" y="455" fill="#a9b7d0" font-family="Arial" font-size="21" font-weight="400" text-anchor="start">when should it load?</text><text x="990" y="527" fill="#d59cff" font-family="monospace" font-size="21" font-weight="700" text-anchor="start">INPUTS</text><text x="1210" y="527" fill="#a9b7d0" font-family="Arial" font-size="21" font-weight="400" text-anchor="start">what must already be known?</text><text x="990" y="599" fill="#d59cff" font-family="monospace" font-size="21" font-weight="700" text-anchor="start">STEPS</text><text x="1210" y="599" fill="#a9b7d0" font-family="Arial" font-size="21" font-weight="400" text-anchor="start">what is the repeatable procedure?</text><text x="990" y="671" fill="#d59cff" font-family="monospace" font-size="21" font-weight="700" text-anchor="start">PITFALLS</text><text x="1210" y="671" fill="#a9b7d0" font-family="Arial" font-size="21" font-weight="400" text-anchor="start">what commonly fails?</text><text x="990" y="743" fill="#d59cff" font-family="monospace" font-size="21" font-weight="700" text-anchor="start">VERIFY</text><text x="1210" y="743" fill="#a9b7d0" font-family="Arial" font-size="21" font-weight="400" text-anchor="start">what evidence closes the loop?</text><rect x="100" y="735" width="1720" height="150" rx="16" fill="#0e2231" stroke="#2c6a76" stroke-width="2"/><text x="135" y="790" fill="#f3f7ff" font-family="Arial" font-size="25" font-weight="700" text-anchor="start">Use a skill instead of pasting the same rules into every session.</text><text x="135" y="840" fill="#a9b7d0" font-family="Arial" font-size="21" font-weight="400" text-anchor="start">It shapes the approach; it does not replace judgment or current-source verification.</text></svg>