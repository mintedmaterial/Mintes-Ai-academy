<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#0d1726"/><circle cx="1700" cy="100" r="320" fill="#133b54" opacity=".34"/><circle cx="80" cy="1040" r="330" fill="#2c1d5a" opacity=".22"/><text x="100" y="82" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">MINTE AI ACADEMY  /  EPISODE 02</text><text x="100" y="168" fill="#f3f7ff" font-family="Arial" font-size="58" font-weight="700" text-anchor="start">04 / USE PROFILES AS SAFETY BOUNDARIES</text><text x="100" y="220" fill="#a9b7d0" font-family="Arial" font-size="27" font-weight="400" text-anchor="start">A session is a conversation. A profile is an independent Hermes home.</text><line x1="100" y1="270" x2="1820" y2="270" stroke="#65e6d0" stroke-width="2"/><text x="100" y="1030" fill="#7081a4" font-family="monospace" font-size="19" font-weight="400" text-anchor="start">Cleo  •  Hermes Agent  •  privacy-safe instructional visualization</text><rect x="100" y="335" width="760" height="360" rx="18" fill="#07101c" stroke="#2b4669" stroke-width="2"/><rect x="100" y="335" width="760" height="48" rx="18" fill="#12233c" stroke="#2b4669" stroke-width="2"/><text x="124" y="367" fill="#65e6d0" font-family="Arial" font-size="20" font-weight="700" text-anchor="start">TERMINAL / RUN THIS</text><text x="772" y="367" fill="#7081a4" font-family="Arial" font-size="15" font-weight="700" text-anchor="start">●  ●  ●</text><text x="128" y="423" fill="#a9b7d0" font-family="monospace" font-size="24" font-weight="400" text-anchor="start">$ hermes profile create research</text><text x="128" y="469" fill="#8ff0b2" font-family="monospace" font-size="25" font-weight="400" text-anchor="start">Created profile: research</text><text x="128" y="516" fill="#a9b7d0" font-family="monospace" font-size="24" font-weight="400" text-anchor="start">research setup</text><text x="128" y="562" fill="#a9b7d0" font-family="monospace" font-size="24" font-weight="400" text-anchor="start">research chat</text><rect x="950" y="335" width="390" height="460" rx="18" fill="#12243b" stroke="#65e6d0" stroke-width="2"/><text x="990" y="395" fill="#65e6d0" font-family="monospace" font-size="28" font-weight="700" text-anchor="start">main</text><text x="990" y="455" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• config</text><text x="990" y="503" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• environment</text><text x="990" y="551" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• memory</text><text x="990" y="599" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• skills</text><text x="990" y="647" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• cron</text><text x="990" y="695" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• state</text><rect x="1400" y="335" width="420" height="460" rx="18" fill="#241e36" stroke="#d59cff" stroke-width="2"/><text x="1440" y="395" fill="#d59cff" font-family="monospace" font-size="28" font-weight="700" text-anchor="start">research</text><text x="1440" y="455" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• own config</text><text x="1440" y="503" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• own .env</text><text x="1440" y="551" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• own memory</text><text x="1440" y="599" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• own skills</text><text x="1440" y="647" fill="#f3f7ff" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">• own cron</text><text x="1440" y="695" fill="#f3