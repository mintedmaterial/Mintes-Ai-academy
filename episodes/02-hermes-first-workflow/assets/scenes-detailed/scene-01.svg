<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#08111f"/><circle cx="1700" cy="100" r="320" fill="#133b54" opacity=".34"/><circle cx="80" cy="1040" r="330" fill="#2c1d5a" opacity=".22"/><text x="100" y="82" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">MINTE AI ACADEMY  /  EPISODE 02</text><text x="100" y="168" fill="#f3f7ff" font-family="Arial" font-size="58" font-weight="700" text-anchor="start">YOUR FIRST USEFUL HERMES WORKFLOW</text><text x="100" y="220" fill="#a9b7d0" font-family="Arial" font-size="27" font-weight="400" text-anchor="start">Installing the agent is step zero. Build one small loop you can verify.</text><line x1="100" y1="270" x2="1820" y2="270" stroke="#65e6d0" stroke-width="2"/><text x="100" y="1030" fill="#7081a4" font-family="monospace" font-size="19" font-weight="400" text-anchor="start">Cleo  •  Hermes Agent  •  privacy-safe instructional visualization</text><text x="100" y="330" fill="#65e6d0" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">THE SAFE ORDER</text><rect x="100" y="390" width="300" height="230" rx="22" fill="#111e33" stroke="#65e6d0" stroke-width="3"/><text x="128" y="446" fill="#65e6d0" font-family="monospace" font-size="30" font-weight="700" text-anchor="start">1</text><text x="128" y="500" fill="#f3f7ff" font-family="Arial" font-size="30" font-weight="700" text-anchor="start">VERIFY</text><text x="128" y="550" fill="#a9b7d0" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">binary + config</text><text x="415" y="510" fill="#ffcf70" font-family="Arial" font-size="34" font-weight="700" text-anchor="start">→</text><rect x="444" y="390" width="300" height="230" rx="22" fill="#111e33" stroke="#263754" stroke-width="2"/><text x="472" y="446" fill="#65e6d0" font-family="monospace" font-size="30" font-weight="700" text-anchor="start">2</text><text x="472" y="500" fill="#f3f7ff" font-family="Arial" font-size="30" font-weight="700" text-anchor="start">CHAT</text><text x="472" y="550" fill="#a9b7d0" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">real answer</text><text x="759" y="510" fill="#ffcf70" font-family="Arial" font-size="34" font-weight="700" text-anchor="start">→</text><rect x="788" y="390" width="300" height="230" rx="22" fill="#111e33" stroke="#263754" stroke-width="2"/><text x="816" y="446" fill="#65e6d0" font-family="monospace" font-size="30" font-weight="700" text-anchor="start">3</text><text x="816" y="500" fill="#f3f7ff" font-family="Arial" font-size="30" font-weight="700" text-anchor="start">SKILL</text><text x="816" y="550" fill="#a9b7d0" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">repeatable rules</text><text x="1103" y="510" fill="#ffcf70" font-family="Arial" font-size="34" font-weight="700" text-anchor="start">→</text><rect x="1132" y="390" width="300" height="230" rx="22" fill="#111e33" stroke="#263754" stroke-width="2"/><text x="1160" y="446" fill="#65e6d0" font-family="monospace" font-size="30" font-weight="700" text-anchor="start">4</text><text x="1160" y="500" fill="#f3f7ff" font-family="Arial" font-size="30" font-weight="700" text-anchor="start">PROFILE</text><text x="1160" y="550" fill="#a9b7d0" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">isolated state</text><text x="1447" y="510" fill="#ffcf70" font-family="Arial" font-size="34" font-weight="700" text-anchor="start">→</text><rect x="1476" y="390" width="300" height="230" rx="22" fill="#111e33" stroke="#263754" stroke-width="2"/><text x="1504" y="446" fill="#65e6d0" font-family="monospace" font-size="30" font-weight="700" text-anchor="start">5</text><text x="1504" y="500" fill="#f3f7ff" font-family="Arial" font-size="30" font-weight="700" text-anchor="start">CRON</text><text x="1504" y="550" fill="#a9b7d0" font-family="monospace" font-size="22" font-weight="400" text-anchor="start">local artifact</text><rect x="100" y="700" width="1720" height="180" rx="18" fill="#0e2231" stroke="#2c6a76" stroke-width="2"/><text x="140" y="760" fill="#65e6d0" font-family="Arial" font-size="21" font-weight="700" text-anchor="start">Viewer result</text><text x="140" y="812" fill="#f3f7ff" font-family="Arial" font-size="30" font-weight="400" text-anchor="start">A harmless recurring research brief, with a command-by-command verification gate.</text><text x="140" y="852" fill="#a9b7d0" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">No secrets on screen. No public delivery. No “green light” accepted without a real result.</text></svg>